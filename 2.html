<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚫ HALFTONE · MULTITAB ⚫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: 
                radial-gradient(circle at 30% 40%, rgba(255,255,255,0.9) 0%, rgba(0,0,0,0.95) 70%),
                repeating-radial-gradient(circle at 20% 30%, #000 0px, #000 2px, #fff 2px, #fff 6px);
            background-blend-mode: overlay;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            overflow: hidden;
        }

        /* extra halftone layer via pseudo-element → more density, round vignette */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0.9) 90%),
                        repeating-radial-gradient(circle at 40% 60%, #000 0px, #000 3px, #fff 3px, #fff 7px);
            background-blend-mode: hard-light;
            opacity: 0.6;
            mix-blend-mode: multiply;
        }

        .card {
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
            width: min(80vw, 550px);
            aspect-ratio: 1/1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 6px rgba(255,255,255,0.25), 0 0 30px 10px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,255,255,0.3);
            border: 2px dotted rgba(255,255,255,0.5);
            position: relative;
            z-index: 10;
            /* round gradient inside the card */
            background: radial-gradient(circle at 70% 30%, #f0f0f0 0%, #1a1a1a 80%);
        }

        /* halftone reinforcment on card */
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: repeating-radial-gradient(circle at 20% 40%, black 0px, black 2px, white 2px, white 5px);
            mix-blend-mode: soft-light;
            opacity: 0.4;
            pointer-events: none;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 6px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 5px black, 0 0 15px rgba(255,255,255,0.7);
            margin-bottom: 1.8rem;
            background: rgba(0,0,0,0.4);
            padding: 0.3rem 2rem;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            border: 1px solid white;
            text-transform: uppercase;
            transform: rotate(-1deg);
        }

        .button-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .doom-btn {
            background: transparent;
            border: 3px solid white;
            color: white;
            font-size: 2rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            padding: 1rem 2rem;
            border-radius: 58% 42% 48% 52% / 38% 42% 58% 62%;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,255,255,0.5), inset 0 0 20px rgba(0,0,0,0.8);
            background: radial-gradient(circle at 30% 50%, #ffffff80 0%, #00000080 100%);
            backdrop-filter: blur(3px);
            transition: 0.2s;
            letter-spacing: 4px;
            transform: scale(1);
            line-height: 1.2;
            min-width: 200px;
            text-shadow: 0 0 8px black;
        }

        .tab-btn {
            background: transparent;
            border: 3px solid #88ccff;
            color: #88ccff;
            font-size: 1.8rem;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            padding: 1rem 2rem;
            border-radius: 42% 58% 52% 48% / 52% 48% 62% 38%;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(136,204,255,0.5), inset 0 0 20px rgba(0,0,0,0.8);
            background: radial-gradient(circle at 70% 50%, #88ccff40 0%, #00000080 100%);
            backdrop-filter: blur(3px);
            transition: 0.2s;
            letter-spacing: 4px;
            min-width: 240px;
            text-shadow: 0 0 8px #88ccff;
        }

        .tab-btn:hover {
            background: radial-gradient(circle at 70% 50%, #88ccffff 0%, #224466 100%);
            box-shadow: 0 0 60px #88ccff;
            border-color: #fff;
            transform: scale(1.03);
            color: white;
        }

        .doom-btn:hover {
            background: radial-gradient(circle at 30% 50%, #ffffffff 0%, #222222 100%);
            box-shadow: 0 0 60px white;
            border-color: #aaa;
            transform: scale(1.03);
            color: black;
            text-shadow: 0 0 5px white;
        }

        /* extra halftone dots floating */
        .dots {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            background-image: radial-gradient(circle at 10% 20%, rgba(0,0,0,0.3) 1px, transparent 1px),
                              radial-gradient(circle at 90% 70%, rgba(255,255,255,0.5) 1px, transparent 1px);
            background-size: 40px 40px, 80px 80px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.5;
        }

        .dots2 {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-radial-gradient(circle at 70% 50%, #000 0px, #000 1px, #fff 1px, #fff 4px);
            background-size: 12px 12px;
            mix-blend-mode: screen;
            opacity: 0.25;
            pointer-events: none;
            z-index: 6;
        }

        footer {
            position: fixed;
            bottom: 12px;
            right: 18px;
            color: #ccc;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid white;
            z-index: 30;
            font-family: monospace;
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>
    <!-- extra halftone overlays -->
    <div class="dots"></div>
    <div class="dots2"></div>

    <main class="card">
        <h1>⦿ HALFTONE ⦿</h1>
        <div class="button-container">
            <button class="doom-btn" id="endButton">end it?</button>
            <button class="tab-btn" id="tabButton">⊕ open 5 tabs ⊕</button>
        </div>
    </main>

    <footer>◉ click · open tabs · explore ◉</footer>

    <script>
        (function() {
            'use strict';

            const endBtn = document.getElementById('endButton');
            const tabBtn = document.getElementById('tabButton');

            // Original button - keeps the alerts
            endBtn.addEventListener('click', function() {
                alert("1 r u sure yo");
                alert("2 okay twin");
            });

            // New button that opens 5 tabs with halftone variations
            tabBtn.addEventListener('click', function() {
                // Array of different halftone style pages to open
                const halftoneVariations = [
                    {
                        title: 'Halftone · Dots',
                        bgStyle: 'repeating-radial-gradient(circle at 30% 30%, black 0px, black 3px, white 3px, white 8px)'
                    },
                    {
                        title: 'Halftone · Lines',
                        bgStyle: 'repeating-linear-gradient(45deg, black 0px, black 4px, white 4px, white 10px)'
                    },
                    {
                        title: 'Halftone · Grid',
                        bgStyle: 'repeating-linear-gradient(0deg, black 0px, black 2px, white 2px, white 6px), repeating-linear-gradient(90deg, black 0px, black 2px, white 2px, white 6px)'
                    },
                    {
                        title: 'Halftone · Circles',
                        bgStyle: 'repeating-radial-gradient(circle at 50% 50%, black 0px, black 4px, white 4px, white 12px)'
                    },
                    {
                        title: 'Halftone · Waves',
                        bgStyle: 'repeating-radial-gradient(ellipse at 50% 50%, black 0px, black 3px, white 3px, white 9px)'
                    }
                ];

                // Open 5 new tabs
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const variation = halftoneVariations[i % halftoneVariations.length];
                        
                        // Create a simple HTML page as a data URL
                        const htmlContent = `
                            <!DOCTYPE html>
                            <html>
                            <head>
                                <title>${variation.title}</title>
                                <style>
                                    body {
                                        margin: 0;
                                        min-height: 100vh;
                                        background: ${variation.bgStyle};
                                        background-size: 60px 60px;
                                        display: flex;
                                        align-items: center;
                                        justify-content: center;
                                        font-family: 'Courier New', monospace;
                                    }
                                    .message {
                                        background: rgba(0,0,0,0.7);
                                        color: white;
                                        padding: 2rem 3rem;
                                        border-radius: 30px;
                                        border: 3px solid white;
                                        backdrop-filter: blur(5px);
                                        text-align: center;
                                        box-shadow: 0 0 50px rgba(255,255,255,0.3);
                                    }
                                    h1 {
                                        font-size: 2.5rem;
                                        margin-bottom: 1rem;
                                        letter-spacing: 4px;
                                    }
                                    p {
                                        font-size: 1.2rem;
                                        opacity: 0.8;
                                    }
                                </style>
                            </head>
                            <body>
                                <div class="message">
                                    <h1>⚫ ${variation.title} ⚫</h1>
                                    <p>halftone pattern · tab ${i + 1}</p>
                                </div>
                            </body>
                            </html>
                        `;
                        
                        const dataUrl = 'data:text/html;charset=utf-8,' + encodeURIComponent(htmlContent);
                        window.open(dataUrl, '_blank');
                    }, i * 100); // Small delay between openings
                }
                
                // Visual feedback on button
                tabBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    tabBtn.style.transform = 'scale(1)';
                }, 200);
            });
        })();
    </script>
</body>
</html>
